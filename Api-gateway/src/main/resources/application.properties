spring.application.name=Api-gateway
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
logging.level.org.springframework.cloud.gateway=TRACE
logging.level.reactor.netty.http.client=DEBUG

springdoc.swagger-ui.urls[0].name=User Service
springdoc.swagger-ui.urls[0].url=/user/v3/api-docs

springdoc.swagger-ui.urls[1].name=Tax Service
springdoc.swagger-ui.urls[1].url=/tax/v3/api-docs

springdoc.swagger-ui.urls[2].name=GateWay Service
springdoc.swagger-ui.urls[2].url=/v3/api-docs


#service urls
userService.url = http://localhost:8093
taxService.url = http://localhost:8094